<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>农田监控系统</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="styles.css">

</head>

<body>

<h1>农田数据监控平台</h1>

<button onclick="logout()">退出</button>

<hr>

<h2>摄像头画面</h2>

<!--<img id="camera" width="500" src="camera.jpg">-->
<img src="http://raspberrypi:8080/?action=stream" alt="摄像头画面">

<hr>

<h2>实时数据</h2>

<p>温度：<span id="temp"></span> ℃</p>
<p>湿度：<span id="hum"></span> %</p>

<p>电机状态：<span id="motor"></span></p>

<p>蜂鸣器：<span id="buzzer"></span></p>

<p>农田状态：<span id="status"></span></p>

<hr>

<h2>AI分析图</h2>

<canvas id="chart" width="600" height="300"></canvas>

<hr>

<h2>系统建议</h2>

<p id="suggest"></p>

<script src="js/dashboard.js"></script>

</body>
</html>
